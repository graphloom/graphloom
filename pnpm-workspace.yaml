packages:
  - packages/*
  - packages/plugins/*
  - apps/*
overrides:
  '@types/node': ^24.13.2
allowBuilds:
  # Native accelerators for ng-packagr watch / @angular/build caching — the
  # prebuilt binaries they ship are enough; no postinstall compile needed.
  '@parcel/watcher': false
  esbuild: true
  lmdb: false
  msgpackr-extract: false
  nx: true
  sharp: false
minimumReleaseAgeExclude:
  - '@angular/common@22.0.6'
  - '@angular/compiler-cli@22.0.6'
  - '@angular/compiler@22.0.6'
  - '@angular/core@22.0.6'
  - '@angular/platform-browser@22.0.6'
  - '@angular/platform-server@22.0.6'
