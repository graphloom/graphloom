name: CI

on:
  push:
    branches: [main]
  pull_request:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  checks:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        node-version: [24, latest]
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - name: Lockfile ban check (ADR-0006)
        run: node tools/check-lockfile-bans.mjs
      - run: pnpm lint
      - run: pnpm typecheck
      - name: Build & test (affected on PRs)
        run: |
          if [ "${{ github.event_name }}" = "pull_request" ]; then
            pnpm exec nx affected -t build test --base=origin/${{ github.base_ref }}
          else
            pnpm exec nx run-many -t build test
          fi
      - name: Package health (publint + attw)
        if: matrix.node-version == 24
        run: pnpm pkgcheck
      - name: Tree-shaking probe
        if: matrix.node-version == 24
        run: node tools/check-treeshake.mjs

  e2e-smoke:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      # The examples app imports built package dists (P3-T10).
      - run: pnpm exec nx run-many -t build
      - run: pnpm exec playwright install --with-deps chromium firefox webkit
      - run: pnpm e2e
      # On failure the report + test-results carry actual screenshots — used
      # to bootstrap/refresh visual baselines (download, review, commit).
      - uses: actions/upload-artifact@v4
        if: failure()
        with:
          name: playwright-report
          path: |
            playwright-report/
            test-results/
